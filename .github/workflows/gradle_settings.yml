name: Multi-Platform & Multi-Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 12 * * 3'  # Среда 12:30 UTC
    - cron: '0 22 * * 5'   # Пятница 22:00 UTC

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ['11', '13', '17']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.java-version == '13' && 'zulu' || 'temurin' }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build & Run Tests
        run: ./gradlew build
